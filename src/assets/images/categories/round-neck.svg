<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradRound" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glowRound" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="#0b1120"/>
  <circle cx="200" cy="190" r="175" fill="url(#glowRound)"/>

  <!-- standard fitted tee -->
  <path d="M168,98
           L154,118
           L88,145
           L74,190
           L120,210
           L132,190
           L132,328
           Q200,342 268,328
           L268,190
           L280,210
           L326,190
           L312,145
           L246,118
           L232,98
           Q200,124 168,98 Z"
        fill="url(#gradRound)" opacity="0.92"/>

  <!-- round crew neckline -->
  <ellipse cx="200" cy="108" rx="34" ry="16" fill="#0b1120" opacity="0.85"/>

  <!-- hem -->
  <path d="M134,318 Q200,332 266,318" stroke="#0b1120" stroke-width="3" fill="none" opacity="0.35"/>

  <!-- sleeve seams -->
  <path d="M132,190 L120,210 M268,190 L280,210" stroke="#0b1120" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>

  <text x="200" y="382" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="600" fill="#94a3b8" letter-spacing="1">ROUND NECK</text>
</svg>
