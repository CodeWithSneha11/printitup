<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradHood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glowHood" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="#0b1120"/>
  <circle cx="200" cy="200" r="175" fill="url(#glowHood)"/>

  <!-- long sleeves + body -->
  <path d="M150,130
           L130,150
           L55,190
           L45,260
           L100,270
           L118,235
           L118,340
           Q200,354 282,340
           L282,235
           L300,270
           L355,260
           L345,190
           L270,150
           L250,130
           Q200,150 150,130 Z"
        fill="url(#gradHood)" opacity="0.92"/>

  <!-- hood shape -->
  <path d="M150,130 Q160,90 200,86 Q240,90 250,130
           Q225,118 200,118 Q175,118 150,130 Z"
        fill="url(#gradHood)" opacity="0.95"/>
  <ellipse cx="200" cy="122" rx="26" ry="12" fill="#0b1120" opacity="0.8"/>

  <!-- drawstrings -->
  <line x1="188" y1="130" x2="182" y2="175" stroke="#0b1120" stroke-width="3" opacity="0.6"/>
  <line x1="212" y1="130" x2="218" y2="175" stroke="#0b1120" stroke-width="3" opacity="0.6"/>
  <circle cx="182" cy="178" r="4" fill="#0b1120" opacity="0.7"/>
  <circle cx="218" cy="178" r="4" fill="#0b1120" opacity="0.7"/>

  <!-- kangaroo pocket -->
  <path d="M150,255 Q200,270 250,255 L250,300 Q200,315 150,300 Z" fill="#0b1120" opacity="0.35"/>

  <!-- sleeve cuffs -->
  <path d="M100,270 L96,285 M300,270 L304,285" stroke="#0b1120" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <text x="200" y="382" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="600" fill="#94a3b8" letter-spacing="1">COZY HOODIE</text>
</svg>
